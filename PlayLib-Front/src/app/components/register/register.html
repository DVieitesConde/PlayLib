<div class="login-container">
  <div class="form">
        <img alt="Logo Image" class="logo-image">
        <h2>Crear cuenta</h2>
        <form>
            <div class="form-group">
                <label for="username">Nombre de usuario: </label>
                <input type="text" id="username" name="username" required>
            </div> <br>
            <div class="form-group">
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" required>
            </div> <br>
            <div class="form-group">
                <label for="password">Contraseña: </label>
                <input type="password" id="password" name="password" required>
            </div><br>
            <div class="form-group">
                <label for="reppassword">Repetir contraseña: </label>
                <input type="password" id="reppassword" name="reppassword" required>
            </div>
            <button type="button" (click)="toHome()">Crear cuenta</button>
            <button type="button" (click)="toLogin()">Cancelar</button>
        </form>
  </div>
</div>
